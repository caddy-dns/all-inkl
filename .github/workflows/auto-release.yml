name: Auto-release on version bump merge

on:
  push:
    branches: [main]
    paths:
      - go.mod

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if this was a version bump
        id: check
        run: |
          VERSION=$(git diff HEAD~1 HEAD -- go.mod | grep "^+.*libdns/all-inkl" | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          if [ -n "$VERSION" ]; then
            echo "is_bump=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "is_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check.outputs.is_bump == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.version }}
          body: |
            Bumped `libdns/all-inkl` to ${{ steps.check.outputs.version }}.

            See [libdns/all-inkl releases](https://github.com/libdns/all-inkl/releases/tag/${{ steps.check.outputs.version }}) for full changelog.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
